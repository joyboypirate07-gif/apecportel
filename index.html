<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Student Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#800000,#b71c1c,#d32f2f);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url("logo.png") center center no-repeat;
    background-size:500px;
    opacity:0.05;
}

.login-box{

    position:relative;
    width:420px;
    background:rgba(255,255,255,.95);
    border-radius:20px;
    padding:35px;
    box-shadow:0px 15px 40px rgba(0,0,0,.35);
    text-align:center;
    z-index:10;

}

.logo{

    width:130px;
    height:130px;
    object-fit:contain;
    margin-bottom:10px;

}

h2{

    color:#8B0000;
    font-size:24px;

}

.college{

    color:#555;
    font-size:14px;
    margin-bottom:25px;

}

.input-group{

    text-align:left;
    margin-bottom:18px;

}

.input-group label{

    display:block;
    font-weight:bold;
    margin-bottom:8px;
    color:#333;

}

.input-group input{

    width:100%;
    padding:13px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
    outline:none;

}

.input-group input:focus{

    border-color:#8B0000;

}

.options{

    display:flex;
    justify-content:space-between;
    font-size:14px;
    margin-bottom:20px;

}

.options a{

    text-decoration:none;
    color:#8B0000;

}

button{

    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#8B0000;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;

}

button:hover{

    background:#5c0000;

}

.footer{

    margin-top:20px;
    color:#666;
    font-size:13px;

}

@media(max-width:500px){

.login-box{

width:90%;

}

.logo{

width:100px;
height:100px;

}

}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.png" class="logo" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<p class="college">
Melmaruvathur<br>
Student Login Portal
</p>

<form>

<div class="input-group">
<label>Register Number</label>
<input type="text" placeholder="Enter Register Number">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter Password">
</div>

<div class="options">

<label>
<input type="checkbox">
Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">
LOGIN
</button>

</form>

<div class="footer">
© 2026 Adhiparasakthi Engineering College<br>
Student Information System
</div>

</div>

</body>
</html>
